<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chat Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;700&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0f14;--surface:#13161e;--surface2:#1a1e2a;--border:rgba(255,255,255,0.07);--accent:#6c63ff;--text:#e8eaf0;--muted:#6b7280;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow:hidden;}
  body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;}

  /* TOPBAR */
  .topbar{display:flex;align-items:center;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;height:48px;}
  .logo{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--accent);padding:0 14px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;white-space:nowrap;}
  .tabs{display:flex;flex:1;overflow-x:auto;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{padding:0 16px;font-size:12px;cursor:pointer;color:var(--muted);border-right:1px solid var(--border);transition:all .15s;position:relative;white-space:nowrap;height:48px;display:flex;align-items:center;gap:6px;flex-shrink:0;}
  .tab:hover{color:var(--text);background:var(--surface2);}
  .tab.active{color:var(--text);background:var(--surface2);}
  .tab.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent);}
  .badge{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;}
  .refresh-box{padding:0 14px;font-size:10px;color:var(--muted);display:flex;align-items:center;gap:6px;margin-left:auto;flex-shrink:0;}
  .dot{width:6px;height:6px;border-radius:50%;background:#43e97b;flex-shrink:0;}
  .dot.live{animation:pulse 2s infinite;}
  .dot.err{background:#ff4d4d;animation:none;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}

  /* LAYOUT */
  .body{display:flex;flex:1;overflow:hidden;}

  /* SIDEBAR */
  .sidebar{width:270px;min-width:270px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:transform .25s;}
  .search-box{margin:10px;position:relative;}
  .search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:8px 10px 8px 32px;color:var(--text);font-family:'Golos Text',sans-serif;font-size:13px;outline:none;transition:border-color .2s;}
  .search-box input:focus{border-color:var(--accent);}
  .search-box input::placeholder{color:var(--muted);}
  .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);opacity:.35;}
  .user-list{flex:1;overflow-y:auto;padding:6px;}
  .user-list::-webkit-scrollbar{width:3px;}
  .user-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  /* USER CARD */
  .user-card{border-radius:10px;padding:10px 12px;margin-bottom:3px;cursor:pointer;border:1px solid transparent;transition:all .15s;}
  .user-card:hover{background:var(--surface2);border-color:var(--border);}
  .user-card.active{background:var(--surface2);border-color:var(--accent);box-shadow:0 4px 16px rgba(108,99,255,.12);}
  .uc-top{display:flex;align-items:center;gap:9px;}
  .avatar{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;flex-shrink:0;}
  .uinfo{flex:1;min-width:0;}
  .uname{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .utime{font-size:10px;color:var(--muted);margin-top:1px;}
  .ucnt{background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:10px;flex-shrink:0;}
  .ulast{font-size:11px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  /* MAIN */
  .main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
  .back-btn{display:none;align-items:center;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);font-size:13px;color:var(--accent);cursor:pointer;flex-shrink:0;}

  .chat-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);flex-shrink:0;}
  .ch-av{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;flex-shrink:0;}
  .ch-info{flex:1;min-width:0;}
  .ch-info h2{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .ch-info p{font-size:11px;color:var(--muted);margin-top:2px;}
  .ch-stats{display:flex;gap:16px;flex-shrink:0;}
  .stat{text-align:center;}
  .sv{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;color:var(--accent);}
  .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:1px;}

  /* MESSAGES */
  .chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:4px;}
  .chat-messages::-webkit-scrollbar{width:3px;}
  .chat-messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .date-sep{text-align:center;margin:12px 0 6px;}
  .date-sep span{font-size:10px;color:var(--muted);background:var(--surface2);padding:3px 12px;border-radius:20px;border:1px solid var(--border);font-family:'Unbounded',sans-serif;font-weight:300;}
  .msg-row{display:flex;gap:8px;animation:up .18s ease forwards;opacity:0;}
  @keyframes up{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
  .msg-row.user{flex-direction:row-reverse;}
  .msg-av{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0;align-self:flex-end;font-family:'Unbounded',sans-serif;}
  .bw{display:flex;flex-direction:column;max-width:75%;}
  .msg-row.user .bw{align-items:flex-end;}
  .bubble{padding:8px 12px;border-radius:14px;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word;}
  .msg-row.user .bubble{background:#1e2235;border:1px solid rgba(108,99,255,.2);border-bottom-right-radius:3px;}
  .msg-row.bot .bubble{background:#1a2a1f;border:1px solid rgba(67,233,123,.15);border-bottom-left-radius:3px;}
  .btime{font-size:9px;color:var(--muted);margin-top:3px;}
  .msg-row.user .btime{text-align:right;}
  .nav-wrap{text-align:center;margin:3px 0;}
  .nav-pill{display:inline-block;background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:3px 10px;font-size:10px;color:var(--muted);font-style:italic;}
  .tag{display:inline-block;font-size:8px;font-family:'Unbounded',sans-serif;font-weight:600;padding:2px 6px;border-radius:3px;margin-bottom:4px;letter-spacing:.05em;text-transform:uppercase;}
  .t-booking{background:rgba(67,233,123,.12);color:#43e97b;border:1px solid rgba(67,233,123,.25);}
  .t-price{background:rgba(247,183,49,.12);color:#f7b731;border:1px solid rgba(247,183,49,.25);}
  .t-faq{background:rgba(69,170,242,.12);color:#45aaf2;border:1px solid rgba(69,170,242,.25);}
  .t-contra{background:rgba(255,101,132,.12);color:#ff6584;border:1px solid rgba(255,101,132,.25);}
  .t-human{background:rgba(255,77,77,.15);color:#ff4d4d;border:1px solid rgba(255,77,77,.3);}
  .t-service{background:rgba(108,99,255,.12);color:#6c63ff;border:1px solid rgba(108,99,255,.25);}
  .t-other{background:rgba(120,120,120,.1);color:#888;border:1px solid rgba(120,120,120,.2);}

  /* USERS TAB (tab2) */
  .users-panel{flex:1;overflow-y:auto;padding:16px 20px;}
  .users-panel::-webkit-scrollbar{width:3px;}
  .users-panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .upc{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:10px;transition:border-color .15s;}
  .upc:hover{border-color:rgba(108,99,255,.35);}
  .upc-top{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .upc-av{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;flex-shrink:0;}
  .upc-name{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:600;}
  .upc-id{font-size:11px;color:var(--muted);margin-top:2px;}
  .upc-dates{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
  .upc-date{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;font-size:11px;flex:1;min-width:130px;}
  .upc-dl{color:var(--muted);font-size:9px;text-transform:uppercase;letter-spacing:.06em;font-family:'Unbounded',sans-serif;margin-bottom:3px;}
  .upc-dv{color:var(--text);font-weight:500;}
  .upc-mem{background:var(--surface2);border:1px solid rgba(108,99,255,.2);border-radius:10px;padding:10px 14px;}
  .upc-ml{font-size:9px;color:var(--accent);text-transform:uppercase;letter-spacing:.07em;font-family:'Unbounded',sans-serif;margin-bottom:6px;}
  .upc-mt{font-size:13px;color:var(--text);line-height:1.6;}

  /* EMPTY / LOADING */
  .empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);gap:14px;}
  .empty svg{opacity:.2;}
  .empty p{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:300;letter-spacing:.06em;}
  .loading-s{flex:1;display:flex;align-items:center;justify-content:center;gap:10px;color:var(--muted);font-size:12px;}
  .spinner{width:26px;height:26px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* MOBILE */
  @media(max-width:640px){
    .logo{display:none;}
    .sidebar{position:absolute;top:48px;left:0;bottom:0;z-index:100;width:100%;min-width:unset;box-shadow:4px 0 20px rgba(0,0,0,.5);}
    .sidebar.hidden{transform:translateX(-100%);}
    .main{width:100%;}
    .back-btn{display:flex;}
    .ch-stats{display:none;}
    .bw{max-width:82%;}
    .chat-header{padding:10px 14px;}
    .chat-messages{padding:12px 14px;}
    .users-panel{padding:12px 14px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">💬 Чаты</div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab(0)" id="tab0">Сообщения <span class="badge" id="badge0">...</span></div>
    <div class="tab" onclick="switchTab(1)" id="tab1">Пользователи <span class="badge" id="badge1">...</span></div>
  </div>
  <div class="refresh-box">
    <div class="dot live" id="statusDot"></div>
    <span id="refreshLabel">...</span>
  </div>
</div>

<div class="body">
  <div class="sidebar" id="sidebar">
    <div class="search-box">
      <svg class="si" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" placeholder="Поиск..." id="searchInput" oninput="renderList()">
    </div>
    <div class="user-list" id="userList">
      <div class="loading-s"><div class="spinner"></div> Загрузка...</div>
    </div>
  </div>

  <div class="main" id="main">
    <div class="empty">
      <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <p>Выберите пользователя</p>
    </div>
  </div>
</div>

<script>
const SOURCES=[
  {url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTuk8xEPRYJ-vZTTL7Wotbgmk-B9tpJNkaikgtDA3WFAG4sPzi6StIs5HVH5dP6mGT_mtlh9QS4VyA8/pub?gid=0&single=true&output=csv"},
  {url:"https://docs.google.com/spreadsheets/d/e/2PACX-1vTzaquYHpkjMCMq7jmL6yMhDWc3f-Lo2nM9837jctpnGWKHdF-DBI0D02XhH2QN57eEuzli2AaKd-Wz/pub?gid=0&single=true&output=csv"}
];
const PROXIES=[u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`];
const COLORS=[["#6c63ff","#1e1a3d"],["#ff6584","#3d1a22"],["#43e97b","#1a3d28"],["#f7b731","#3d3010"],["#45aaf2","#1a2d3d"],["#fd9644","#3d2510"],["#a29bfe","#201d3d"],["#fd79a8","#3d1a2d"]];
const colorMap={};let ci=0;
const getColor=uid=>{if(!colorMap[uid])colorMap[uid]=COLORS[ci++%COLORS.length];return colorMap[uid];};

const TC={ask_booking:"t-booking",booking_start:"t-booking",ask_price:"t-price",ask_faq:"t-faq",ask_location:"t-faq",ask_contraindications:"t-contra",needs_human:"t-human",ask_services:"t-service",ask_indications:"t-service"};
const TL={ask_indications:"показания",ask_price:"цена",ask_booking:"запись",booking_start:"запись",ask_faq:"FAQ",ask_location:"адрес",ask_contraindications:"⚠ противопоказания",needs_human:"🔴 оператор",ask_services:"услуги",other:"другое",browse_menu:"меню",view_service:"просмотр"};

function parseLine(line){
  const res=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
    else if(ch===','&&!inQ){res.push(cur.trim());cur='';}
    else cur+=ch;
  }
  res.push(cur.trim());return res;
}
function parseCSV(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];
  const headers=parseLine(lines[0]).map(h=>h.replace(/^"|"$/g,'').trim());
  return lines.slice(1).filter(l=>l.trim()).map(l=>{
    const vals=parseLine(l);const obj={};
    headers.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'');});
    return obj;
  });
}

// Parse datetime string → timestamp for sorting
function parseTs(str){
  if(!str)return 0;
  // formats: "04.03.2026 16:05:14" or "2026-03-05 14:54:22"
  str=str.trim();
  if(str.match(/^\d{2}\.\d{2}\.\d{4}/)){
    const[date,time]=str.split(' ');
    const[d,m,y]=date.split('.');
    return new Date(`${y}-${m}-${d}T${time||'00:00:00'}`).getTime();
  }
  return new Date(str).getTime()||0;
}

function normalizeMsg(r){
  return{ts:r['ts']||r['date']||'',name:r['user_name']||r['name']||r['user']||'',uid:r['user_id']||r['uid']||'',role:(r['role']||'').toLowerCase(),text:r['text']||'',intent:r['intent']||r['tag']||'',reply:r['ответ бота']||r['bot_reply']||r['reply']||''};
}

function buildMsgUsers(rows){
  const map={};
  rows.forEach(r=>{
    const uid=r.uid||r.name;if(!uid||!r.name)return;
    if(!map[uid])map[uid]={uid,name:r.name,msgs:[],lastTs:0};
    map[uid].msgs.push(r);
    const t=parseTs(r.ts);
    if(t>map[uid].lastTs)map[uid].lastTs=t;
  });
  // Sort users by lastTs DESC (newest first)
  return Object.values(map).sort((a,b)=>b.lastTs-a.lastTs);
}

async function fetchCSV(rawUrl){
  for(const mk of PROXIES){
    try{
      const res=await fetch(mk(rawUrl),{cache:'no-store'});
      if(!res.ok)continue;
      const text=await res.text();
      if(text.includes(','))return text;
    }catch(e){}
  }
  throw new Error('fail');
}

let tableData=[[],[]];
let activeTab=0,activeUid=null;

async function fetchTable(idx){
  try{
    const text=await fetchCSV(SOURCES[idx].url);
    const rows=parseCSV(text);
    if(idx===0){
      tableData[0]=buildMsgUsers(rows.map(normalizeMsg).filter(r=>r.uid&&r.name));
    } else {
      // Sort users table by last_seen DESC
      tableData[1]=rows
        .filter(r=>r['user_name']||r['name'])
        .sort((a,b)=>parseTs(b['last_seen']||b['updated_at'])-parseTs(a['last_seen']||a['updated_at']));
    }
    document.getElementById('badge'+idx).textContent=tableData[idx].length;
    return true;
  }catch(e){document.getElementById('badge'+idx).textContent='!';return false;}
}

async function loadAll(silent){
  if(!silent)document.getElementById('userList').innerHTML='<div class="loading-s"><div class="spinner"></div> Загрузка...</div>';
  const ok=(await Promise.all([fetchTable(0),fetchTable(1)])).some(Boolean);
  document.getElementById('statusDot').className='dot '+(ok?'live':'err');
  const now=new Date();
  document.getElementById('refreshLabel').textContent=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  if(activeTab===0){
    renderList();
    if(activeUid){const u=tableData[0].find(u=>u.uid===activeUid);if(u)renderChat(u,false);}
  } else {
    renderUsersTab();
  }
}

function switchTab(idx){
  activeTab=idx;activeUid=null;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('sidebar').style.display=idx===0?'flex':'none';
  if(idx===0){renderList();showEmpty();}
  else renderUsersTab();
}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const users=(tableData[0]||[]).filter(u=>u.name.toLowerCase().includes(q));
  const el=document.getElementById('userList');el.innerHTML='';
  if(!users.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:24px 10px;font-size:12px;">Нет данных</div>';return;}
  users.forEach(u=>{
    const[ac,bg]=getColor(u.uid);
    const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
    const cnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
    const last=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).slice(-1)[0];
    // Format last activity time
    const lastTime=u.lastTs?formatRelative(u.lastTs):'';
    const d=document.createElement('div');
    d.className='user-card'+(u.uid===activeUid?' active':'');
    d.onclick=()=>openUser(u.uid);
    d.innerHTML=`<div class="uc-top">
      <div class="avatar" style="background:${bg};color:${ac}">${ini}</div>
      <div class="uinfo"><div class="uname">${u.name}</div><div class="utime">${lastTime}</div></div>
      <span class="ucnt">${cnt}</span></div>
      ${last?`<div class="ulast">${last.text}</div>`:''}`;
    el.appendChild(d);
  });
}

function formatRelative(ts){
  const now=Date.now();const diff=now-ts;
  const m=Math.floor(diff/60000);const h=Math.floor(diff/3600000);const d=Math.floor(diff/86400000);
  if(m<1)return'только что';
  if(m<60)return`${m} мин назад`;
  if(h<24)return`${h} ч назад`;
  if(d<7)return`${d} д назад`;
  return new Date(ts).toLocaleDateString('ru-RU');
}

function openUser(uid){
  activeUid=uid;renderList();
  const u=tableData[0].find(u=>u.uid===uid);
  if(u){
    renderChat(u,true);
    if(window.innerWidth<=640)document.getElementById('sidebar').classList.add('hidden');
  }
}

function showEmpty(){
  document.getElementById('main').innerHTML=`<div class="empty"><svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><p>Выберите пользователя</p></div>`;
}

function renderChat(u,scrollToBottom){
  const[ac,bg]=getColor(u.uid);
  const ini=u.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
  const qCnt=u.msgs.filter(m=>m.role==='user'&&!m.text.startsWith('[')).length;
  const bCnt=u.msgs.filter(m=>m.role==='bot'&&m.reply).length;
  const days=new Set(u.msgs.map(m=>m.ts.split(' ')[0])).size;
  document.getElementById('main').innerHTML=`
    <div class="back-btn" onclick="goBack()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg> Назад</div>
    <div class="chat-header">
      <div class="ch-av" style="background:${bg};color:${ac}">${ini}</div>
      <div class="ch-info"><h2>${u.name}</h2><p>ID: ${u.uid} · ${formatRelative(u.lastTs)}</p></div>
      <div class="ch-stats">
        <div class="stat"><div class="sv">${qCnt}</div><div class="sl">Вопросов</div></div>
        <div class="stat"><div class="sv">${bCnt}</div><div class="sl">Ответов</div></div>
        <div class="stat"><div class="sv">${days}</div><div class="sl">Дней</div></div>
      </div>
    </div>
    <div class="chat-messages" id="cm"></div>`;
  const cm=document.getElementById('cm');
  let lastDate=null,delay=0;
  u.msgs.forEach(msg=>{
    const parts=(msg.ts+' ').split(' ');const d=parts[0],t=parts[1]||'';
    const isNav=msg.text&&msg.text.startsWith('[');
    const displayText=msg.role==='user'?msg.text:msg.reply;
    if(d&&d!==lastDate){const s=document.createElement('div');s.className='date-sep';s.innerHTML=`<span>${d}</span>`;cm.appendChild(s);lastDate=d;}
    if(isNav){const w=document.createElement('div');w.className='nav-wrap';w.innerHTML=`<span class="nav-pill">🔘 ${msg.text}${t?' · '+t:''}</span>`;cm.appendChild(w);return;}
    if(!displayText)return;
    const isUser=msg.role==='user';
    const row=document.createElement('div');
    row.className='msg-row '+(isUser?'user':'bot');
    row.style.animationDelay=delay+'ms';delay+=25;
    const avS=isUser?`style="background:${bg};color:${ac}"`:`style="background:#1a3d28;color:#43e97b"`;
    const tagHtml=msg.intent&&isUser&&!['browse_menu','view_service'].includes(msg.intent)?`<div class="tag ${TC[msg.intent]||'t-other'}">${TL[msg.intent]||msg.intent}</div>`:'';
    row.innerHTML=`<div class="msg-av" ${avS}>${isUser?ini:'🤖'}</div><div class="bw">${tagHtml}<div class="bubble">${displayText}</div><div class="btime">${t}</div></div>`;
    cm.appendChild(row);
  });
  if(scrollToBottom)cm.scrollTop=cm.scrollHeight;
}

function goBack(){
  document.getElementById('sidebar').classList.remove('hidden');
  showEmpty();activeUid=null;renderList();
}

function renderUsersTab(){
  const rows=tableData[1]||[];
  const main=document.getElementById('main');
  if(!rows.length){main.innerHTML='<div class="loading-s"><div class="spinner"></div> Загрузка...</div>';return;}
  main.innerHTML='<div class="users-panel" id="up"></div>';
  const panel=document.getElementById('up');
  rows.forEach(r=>{
    const name=r['user_name']||r['name']||'—';
    const uid=r['user_id']||r['uid']||'';
    const firstSeen=r['first_seen']||'—';
    const lastSeen=r['last_seen']||r['updated_at']||'—';
    const memory=r['memory_summary']||'—';
    const[ac,bg]=getColor(uid||name);
    const ini=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'??';
    const lastTs=parseTs(lastSeen);
    const card=document.createElement('div');card.className='upc';
    card.innerHTML=`
      <div class="upc-top">
        <div class="upc-av" style="background:${bg};color:${ac}">${ini}</div>
        <div>
          <div class="upc-name">${name}</div>
          <div class="upc-id">ID: ${uid}${lastTs?` · ${formatRelative(lastTs)}`:''}</div>
        </div>
      </div>
      <div class="upc-dates">
        <div class="upc-date"><div class="upc-dl">🟢 Первый визит</div><div class="upc-dv">${firstSeen}</div></div>
        <div class="upc-date"><div class="upc-dl">🕐 Последний визит</div><div class="upc-dv">${lastSeen}</div></div>
      </div>
      <div class="upc-mem">
        <div class="upc-ml">🧠 Память о пользователе</div>
        <div class="upc-mt">${memory}</div>
      </div>`;
    panel.appendChild(card);
  });
}

loadAll(false);
setInterval(()=>loadAll(true),30000);
</script>
